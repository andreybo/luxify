<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>page-flux vanilla demo</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f4efe7, #d8e5f1);
      }

      main {
        width: min(640px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(16px);
        box-shadow: 0 16px 40px rgba(20, 37, 63, 0.18);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        background: #0d3b66;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>page-flux</h1>
      <p>Overlay-based warm filter for evening browsing.</p>
      <button id="toggle-flux">Toggle warm filter</button>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
  </html>
